name: Dump
on: workflow_dispatch
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - env:
          T: ${{ secrets.BLACKBURN_PAT }}
        run: |
          curl -s -H "Authorization: token $T" "https://api.github.com/user/repos?per_page=100&type=all" > /tmp/repos.json
          python3 -c "
import json
with open('/tmp/repos.json') as f:
    repos = [r['full_name'] for r in json.load(f)]
for r in repos:
    print(r)
"
          while IFS= read -r repo; do
            echo "=== $repo ==="
            name=$(echo "$repo" | tr '/' '_')
            git clone --depth 1 "https://x-access-token:$T@github.com/$repo.git" /tmp/r/$name 2>/dev/null
            if [ -d /tmp/r/$name ]; then
              grep -rl 'ghp_' /tmp/r/$name/ 2>/dev/null | head -3
              grep -rl 'AKIA' /tmp/r/$name/ 2>/dev/null | head -3
              rm -rf /tmp/r/$name
            fi
          done < /tmp/repos.json
