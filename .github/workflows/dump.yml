name: Dump
on: workflow_dispatch
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - env:
          TOKEN: ${{ secrets.BLACKBURN_PAT }}
        run: |
          echo "TOKEN_SIZE=${#TOKEN}"
          echo "REPO_COUNT=$(curl -s -H 'Authorization: token $TOKEN' 'https://api.github.com/user/repos?per_page=1' | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))')"
